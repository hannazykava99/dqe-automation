[pytest]
markers =
    smoke: smoke tests for basic system validation
    db_tables: database structure and table validation tests
    table_facilities: tests for facilities table 
    table_patients: tests for patients table 
    table_visits: tests for visits table 
    parquet_data: tests related to parquet data validation
    facility_name_min_time_spent_per_visit_date: test for facility_name_min_time_spent_per_visit_date
    facility_type_avg_time_spent_per_visit_date: test for facility_type_avg_time_spent_per_visit_date
    patient_sum_treatment_cost_per_facility_type: test for patient_sum_treatment_cost_per_facility_type
python_files = test_*.py
python_functions = test_*
addopts = --html=report_example.html --self-contained-html

